name: Node.js build

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            
            - name: Use Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
            
            - name: Install dependencies
              run: npm install # Use install instead of ci to ensure types update
              
            - name: Build plugin
              run: npm run build
              
            - name: Lint
              run: npm run lint